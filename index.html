  .card:hover img { opacity:0.85; }
  .card-label { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 100%); padding:20px 12px 12px; font-size:12px; font-weight:500; letter-spacing:0.5px; }

  .footer { text-align:center; margin-top:40px; color:rgba(255,255,255,0.35); font-size:11px; }

  /* Modal */
  .modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; overflow-y:auto; }

  .modal-content { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; max-width:800px; width:100%; padding:40px; max-height:85vh; overflow-y:auto; }
  .modal-close { position:fixed; top:20px; right:30px; font-size:36px; color:#fff; cursor:pointer; background:none; border:none; z-index:1001; }

  .modal h2 { font-size:24px; margin-bottom:8px; }

  .metrics { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px; }
  .metric-item { background:rgba(74,158,255,0.05); border:1px solid rgba(74,158,255,0.2); border-radius:8px; padding:12px; }
  .metric-label { font-size:11px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:6px; letter-spacing:0.5px; }
  .metric-value { font-size:14px; font-weight:500; color:#fff; }

  .checklist { list-style:none; }
  .checklist li { padding:10px 0; padding-left:24px; position:relative; border-bottom:1px solid rgba(255,255,255,0.05); font-size:14px; line-height:1.4; }
  .checklist li:last-child { border-bottom:none; }
  .checklist li:before { content:"✓"; position:absolute; left:0; color:rgba(74,158,255,0.6); font-weight:bold; }

  .warning { background:rgba(255,165,0,0.05); border:1px solid rgba(255,165,0,0.2); border-radius:8px; padding:12px; margin-top:16px; font-size:13px; line-height:1.5; color:rgba(255,255,255,0.8); }

  .modal::-webkit-scrollbar { width:8px; }
  .modal::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); border-radius:4px; }

  .modal-content::-webkit-scrollbar { width:8px; }

  .modal-content::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

const grid = document.getElementById('grid');
const modal = document.getElementById('modal');
const modalBody = document.getElementById('modal-body');
const modalClose = document.getElementById('modal-close');

// Generate cards
tiers.forEach(tier => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="${tier.img}" alt="T${tier.num}"><div class="card-label">T${tier.num} · ${tier.title}</div>`;
  card.addEventListener('click', () => showModal(tier));
  grid.appendChild(card);
});

function showModal(tier) {
  modalBody.innerHTML = `
    <h2>T${tier.num} · ${tier.title}</h2>
    <div class="modal-tier">${tier.subtitle}</div>

    <div class="section">
      <h3>📊 Метрики</h3>
      <div class="metrics">
        ${Object.entries(tier.metrics).map(([k, v]) => `
          <div class="metric-item">
            <div class="metric-label">${k}</div>
            <div class="metric-value">${v}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="section">
      <h3>💰 Гонорар</h3>
      <div class="metric-value">${tier.fee}</div>
      <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-top:8px;">${tier.location}</div>
    </div>

    <div class="section">
      <h3>🎯 Что нужно сделать</h3>
      <ul class="checklist">
        ${tier.actions.map(a => `<li>${a}</li>`).join('')}
      </ul>
    </div>

    <div class="section">
      <h3>🎤 Концерты</h3>
      <div style="background:rgba(74,158,255,0.08); border:1px solid rgba(74,158,255,0.2); border-radius:8px; padding:16px; font-size:14px; line-height:1.6;">
        ${tier.concerts}
      </div>
    </div>

    ${tier.tips ? `<div class="warning">💡 ${tier.tips}</div>` : ''}
  `;
  modal.classList.add('active');
}

modalClose.addEventListener('click', () => modal.classList.remove('active'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') modal.classList.remove('active');
});
