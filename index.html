const grid = document.getElementById('grid');
const modal = document.getElementById('modal');
const modalBody = document.getElementById('modal-body');
const modalClose = document.getElementById('modal-close');

// Generate cards
tiers.forEach(tier => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="${tier.img}" alt="T${tier.num}"><div class="card-label">T${tier.num} · ${tier.title}</div>`;
  card.addEventListener('click', () => showModal(tier));
  grid.appendChild(card);
});

function showModal(tier) {
  const howTheyFindHtml = tier.howTheyFindYou.map((method, i) => `
    <div style="margin-bottom: 12px;">
      <div style="font-weight:600; margin-bottom:4px;">${i+1}. ${method.title}</div>
      <div style="font-size:12px; color:rgba(255,255,255,0.7);">${method.desc}</div>
    </div>
  `).join('');

  const signalsHtml = tier.signalsThatMatter.map(sig => `
    <div class="signal">
      <div class="signal-label">${sig.label}</div>
      <div class="signal-strength">${sig.strength}</div>
    </div>
  `).join('');

  const backgroundMetrics = Object.entries(tier.background).map(([k, v]) => `
    <div class="metric-bg">
      <div class="metric-bg-label">${k}</div>
      <div class="metric-bg-value">${v}</div>
    </div>
  `).join('');

  modalBody.innerHTML = `
    <h2>T${tier.num} · ${tier.title}</h2>
    <div class="modal-subtitle">${tier.subtitle}</div>

    <div class="modal-focus">
      ${tier.focus}
    </div>

    <div class="section">
      <h3>🎯 What promoter/agent looks for</h3>
      <div style="font-size:13px; line-height:1.6; margin-bottom:12px;">${tier.whoDecides}</div>
      <div class="list-block">
        ${tier.whatTheyLookFor.map(item => `<div class="list-item">✓ ${item}</div>`).join('')}
      </div>
    </div>

    <div class="section">
      <h3>🔍 How they find you (scalable)</h3>
      <div>${howTheyFindHtml}</div>
    </div>

    <div class="section">
      <h3>📊 Which signals matter (for THIS tier)</h3>
      <div class="signals">${signalsHtml}</div>
    </div>

    <div class="section">
      <h3>📈 These metrics are in the background</h3>
      <div class="metrics-bg">${backgroundMetrics}</div>
      <div style="font-size:12px; margin-top:12px; color:rgba(255,255,255,0.6);">
        <strong>What they mean:</strong> ${tier.whatTheseMetricsMean}
      </div>
    </div>

    <div class="section">
      <h3>💰 Booking fee</h3>
      <div style="font-size:16px; font-weight:600; margin-bottom:6px;">${tier.fee}</div>
      <div style="font-size:12px; color:rgba(255,255,255,0.6);">at ${tier.location}</div>
    </div>

    <div class="section">
      <h3>🎬 What you actually do</h3>
      <div class="list-block">
        ${tier.actions.map(action => `<div class="list-item">→ ${action}</div>`).join('')}
      </div>
    </div>

    <div class="section">
      <h3>🎤 How you get gigs</h3>
      <div class="highlight-box">${tier.howToGetNextGig}</div>
    </div>

    <div class="section">
      <h3>📅 Concert frequency & reality</h3>
      <div class="highlight-box">${tier.concerts}</div>
    </div>

    ${tier.warning ? `<div class="warning">${tier.warning}</div>` : ''}
  `;
  modal.classList.add('active');
}

modalClose.addEventListener('click', () => modal.classList.remove('active'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') modal.classList.remove('active');
});
