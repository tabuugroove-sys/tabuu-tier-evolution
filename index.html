<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TABUU · Tier Evolution T1 → T9</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  body { background:#0a0a12; color:#fff; padding:30px 20px; min-height:100vh; }
  h1 { text-align:center; font-size:22px; font-weight:700; letter-spacing:2px; margin-bottom:6px; }
  .sub { text-align:center; color:rgba(255,255,255,0.5); font-size:13px; margin-bottom:30px; }
  .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; max-width:1400px; margin:0 auto; }
  @media (max-width: 900px) { .grid { grid-template-columns:repeat(2, 1fr); } }
  @media (max-width: 600px) { .grid { grid-template-columns:1fr; } }

  .card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:14px; overflow:hidden; transition:transform 0.25s, border-color 0.25s, box-shadow 0.25s; cursor:pointer; position:relative; }
  .card:hover { transform:translateY(-3px); border-color:rgba(74,158,255,0.6); box-shadow: 0 0 20px rgba(74,158,255,0.2); }
  .card img { width:100%; display:block; transition:opacity 0.25s; }
  .card:hover img { opacity:0.85; }
  .card-label { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.9) 60%); padding:40px 16px 16px; font-size:15px; font-weight:700; letter-spacing:0.5px; }
  .card-subtitle { font-size:12px; color:rgba(255,255,255,0.6); margin-top:4px; font-weight:500; letter-spacing:0.3px; }

  .footer { text-align:center; margin-top:40px; color:rgba(255,255,255,0.35); font-size:11px; }

  /* Modal */
  .modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; overflow-y:auto; }
  .modal.active { display:flex; }
  .modal-content { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; max-width:900px; width:100%; padding:40px; max-height:85vh; overflow-y:auto; }
  .modal-close { position:fixed; top:20px; right:30px; font-size:36px; color:#fff; cursor:pointer; background:none; border:none; z-index:1001; }
  .modal-close:hover { color:rgba(255,255,255,0.7); }

  .modal h2 { font-size:28px; margin-bottom:8px; font-weight:700; }
  .modal-subtitle { font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:24px; }
  .modal-focus { background:rgba(74,158,255,0.08); border-left:3px solid rgba(74,158,255,0.6); padding:12px 16px; margin-bottom:28px; font-size:14px; line-height:1.6; }

  .section { margin-bottom:32px; }
  .section h3 { font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:rgba(74,158,255,0.8); margin-bottom:16px; font-weight:600; }

  .action-list { display:grid; gap:12px; }
  .action-item { background:rgba(74,158,255,0.05); border-left:3px solid rgba(74,158,255,0.4); padding:14px 16px; font-size:13px; line-height:1.5; }
  .action-num { color:rgba(74,158,255,0.8); font-weight:600; display:block; margin-bottom:4px; }

  .metrics-result { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:14px; margin-top:8px; }
  .metric-line { display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px; }
  .metric-line:last-child { border-bottom:none; }
  .metric-label { color:rgba(255,255,255,0.6); }
  .metric-value { color:#fff; font-weight:500; }
  .metric-note { font-size:11px; color:rgba(255,255,255,0.4); margin-top:4px; }

  .highlight-box { background:rgba(74,158,255,0.08); border:1px solid rgba(74,158,255,0.2); border-radius:8px; padding:14px; margin-top:12px; font-size:13px; line-height:1.6; }

  .fee-box { background:rgba(74,158,255,0.08); border-left:3px solid rgba(74,158,255,0.6); padding:14px; margin-top:12px; }
  .fee-amount { font-size:16px; font-weight:700; margin-bottom:4px; }
  .fee-details { font-size:12px; color:rgba(255,255,255,0.6); }

  .warning { background:rgba(255,165,0,0.05); border:1px solid rgba(255,165,0,0.2); border-radius:8px; padding:12px; margin-top:16px; font-size:12px; line-height:1.5; color:rgba(255,255,255,0.8); }

  .modal::-webkit-scrollbar { width:8px; }
  .modal::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); border-radius:4px; }
  .modal::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }

  .modal-content::-webkit-scrollbar { width:8px; }
  .modal-content::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }
</style>
</head>
<body>

<h1>TABUU · EVOLUTION T1 → T9</h1>
<div class="sub">from noname bedroom to anti-fashion legend · focus on actions, not vanity metrics</div>

<div class="grid" id="grid">
  <!-- Built: 1778021238 --> <!-- Cards will be generated by JavaScript -->
</div>

<div class="footer">Calibration: IQ-01 Fee Map + IQ-02 Rankings That Matter (MARUX research) + Brazil booking market analysis</div>

<div class="modal" id="modal">
  <button class="modal-close" id="modal-close">×</button>
  <div class="modal-content" id="modal-body"></div>
</div>

<script>
const tiers = [
  {
    num: 1,
    title: 'Zero',
    subtitle: 'Bedroom Producer',
    img: 'T1_zero.png',
    focus: 'Can he DJ without breaking everything? Will he show up?',
    whoDecides: 'Friend / micro-venue owner / another local DJ',
    actions: [
      { num: '1. Finish one track', desc: 'A real 3–5 min mix. Upload to SoundCloud. Test it in your DJ app.' },
      { num: '2. Learn to beatmatch', desc: 'Know your DJ controller/turntables. Don\'t embarrass yourself at first gig.' },
      { num: '3. Play 1–2 hour set', desc: 'Show up on time. Bring your gear. Don\'t get drunk. Just play.' },
      { num: '4. Get feedback', desc: 'Did people enjoy it? Did you mess up? Learn.' }
    ],
    metricsExplain: 'You won\'t have metrics yet. Nobody cares. You\'re learning. Focus on not failing the first gig.',
    fee: '$0 (drinks)',
    concerts: '🎤 Zero gigs = this is prep. You\'re learning to DJ. First gig = your friends + maybe 5 people watching.',
    warning: '💡 Forget metrics. Forget followers. Can you play 60 minutes without losing the room? That\'s the only question.'
  },

  {
    num: 2,
    title: 'First Release',
    subtitle: 'Starter',

    focus: 'He made real music. Not just talking about it.',

      { num: '2. Create basic Instagram', desc: 'Post the release. Post 2–3 times per week. Show that you exist.' },
      { num: '3. Create SoundCloud profile', desc: 'Upload the track + 1–2 simple mixes. DJs search "Afro House mixes" on SC.' },
      { num: '4. Tell 3–5 small promoters', desc: '"I just released [track] on Beatport. I\'m available [date]." Include Spotify link.' },
      { num: '5. Play 1–2 small gigs', desc: 'Even free. Even in a bar. Get the experience + video proof.' }
    ],
    metricsExplain: 'As side effect: Spotify 1k–5k (from your release + friends), Instagram ~500 (you posted), Beatport listing (proof you distributed).',
    fee: '$0–200',
    concerts: '🎤 First real gigs = 1–2 small events/month. Maybe free or $0–50. Promoter is testing if you\'re reliable.',
    warning: '💡 The release is your legitimacy card. Without it, you\'re just a person with dreams. With it, you\'re an artist.'
  },

  {
    num: 3,
    title: 'Local SP',
    subtitle: 'São Paulo Proof',
    img: 'T3_local_sp.png',
    focus: 'He\'s not unknown. He can DJ. He\'s part of the scene.',
    whoDecides: 'Club promoter / São Paulo collective / small booking agent',
    actions: [
      { num: '1. Record 1 strong live-set video', desc: '15–30 min, decent audio, show the mixing and crowd reaction. This is the #1 proof.' },

    ],
    metricsExplain: 'As side effect: Spotify 10k–100k (from gigs + releases), Instagram 2k–10k (venue tags + scene people follow), Beatport Top 500 (3–5 releases), Videos 1–3, Local gigs 3–5.',

    concerts: '🎤 Regular bookings = 3–5 gigs/month in São Paulo. Promoter books because risk is low: you can DJ, you have proof, you fit the vibe.',

  },

  {
    num: 4,
    title: 'Regional BR',
    subtitle: 'Brazil Scene Artist',
    img: 'T4_regional_br.png',
    focus: 'He plays multiple cities. His music is known in the scene.',
    whoDecides: 'Regional booking agent / festivals / bigger clubs (Rio, Salvador, BH)',
    actions: [
      { num: '1. Release on real Afro House labels', desc: 'Not micro-labels. Real ones. Shows gatekeepers approved you.' },
      { num: '2. Play 3–5 different Brazilian cities', desc: 'Not just São Paulo. Rio, Salvador, Belo Horizonte, etc. Prove you can tour.' },
      { num: '3. Film 3–4 professional sets', desc: 'From good venues/festivals. Show progression. Quality matters now.' },
      { num: '4. Build regional Instagram presence', desc: '15k+, mostly from Brazil. Engagement from real scene people, not bots.' },
      { num: '5. Connect with booking agent or manager', desc: 'Stop pitching yourself. Let an agent handle other regions. Focus on music.' }

    concerts: '🎤 Regional expansion = 8–12 gigs/month across Brazil. First festival slots. Agent starts handling bookings.',
    warning: '💡 Without a booking agent, regional expansion is slow. With one, you can have 10+ cities. This is where representation becomes real.'
  },

  {
    num: 5,
    title: 'International',
    subtitle: 'Intl Traveler',
    img: 'T5_international.png',

    whoDecides: 'International booking agent / European clubs / festival programmers',
    actions: [
      { num: '1. Release on major international labels', desc: 'Black Coffee\'s Soulistic, Defected, FFRR, similar caliber.' },
      { num: '2. Reach Top 300 on Beatport', desc: 'Requires 8–12 quality releases + playlist traction. This is international visibility.' },
      { num: '3. Get Spotify playlist placement', desc: 'Editorial or known curator playlists. Shows algorithmic demand.' },
      { num: '4. Play 2–3 European festivals or major venues', desc: 'Ibiza, Barcelona, similar. Film it. Proof you can handle big stages.' },

    concerts: '🎤 International bookings = 15–20 gigs/year, €3k–6k for EU clubs. Major festival slots. Travel is now part of the job.',

  {
    num: 6,
    title: 'Ranked',
    subtitle: 'Magazine Cool',
    img: 'T6_ranked.png',
    focus: 'He\'s in the conversation. Worth featuring in press.',
    whoDecides: 'Premium clubs (Ibiza, NYC) / Major festivals / Music media',
    actions: [
      { num: '1. Get to Beatport Top 10', desc: 'Requires 12–15 hit tracks. This is when you\'re shaping the sound.' },
      { num: '2. Get features in RA / DJ Mag / music blogs', desc: 'Interview, profile, article. Creates momentum.' },
      { num: '3. Headline 3+ major festivals', desc: 'Tomorrowland, Sónar, ADE, etc. This is big stages.' },
      { num: '4. Build YouTube presence', desc: '100k+ views on live sets. Proof of draw and quality.' },
      { num: '5. Launch own record label', desc: '5–10 releases from your label. Shows authority.' }
    ],
    metricsExplain: 'As side effect: Beatport Top 10 (consistent), Spotify 200k–800k (global fans), Instagram 150k–500k, YouTube 100k+ views, 30–40 annual bookings.',
    fee: 'EU €8k–18k / US $12k–25k',
    concerts: '🎤 Premium bookings = 30–40 gigs/year. Premium EU clubs + major US festivals. Every booking is a statement.',

  },

  {
    num: 7,
    title: 'Top Tier',
    subtitle: 'Brand Headliner',
    img: 'T7_top_tier.png',
    focus: 'People buy tickets to see HIM. Not just the event.',
    whoDecides: 'Major festivals / Ibiza megaclubs / International promoters',
    actions: [
      { num: '1. Get 3+ Beatport #1 tracks', desc: 'These are your signature songs.' },
      { num: '2. Reach DJ Mag Top 100', desc: 'Industry validation. You\'re in the history of the genre.' },
      { num: '3. Headline 5+ major festivals', desc: 'Tomorrowland, Burning Man, Sónar headline slots.' },
      { num: '4. Build global media presence', desc: 'Documentary, interviews, profiles, cultural impact.' },
      { num: '5. Create signature event or residency', desc: 'Your own festival or monthly party. Brand extension.' }
    ],
    metricsExplain: 'As side effect: Beatport Top 5 (consistent), Spotify 800k–3M (global fame), Instagram 500k–1.3M, Media coverage everywhere, 50+ annual bookings.',
    fee: 'EU €20k–50k / US $30k–75k',
    concerts: '🎤 Megastar bookings = 50+ gigs/year. Headline slots only. You\'re the reason people come.',
    warning: '💡 Most successful DJs peak at Tier 6. Tier 7 requires everything: music, consistency, media, luck. Very rare.'
  },

  {
    num: 8,
    title: 'DJ Mag 100',
    subtitle: 'Iconic Signature',
    img: 'T8_dj_mag_100.png',
    focus: 'His name IS the event. Generations know him.',
    whoDecides: 'Legendary festivals / Film producers / His agent (he has power)',
    actions: [
      { num: '1. Get multiple Beatport #1 tracks', desc: 'You defined the sound.' },
      { num: '2. Stay in DJ Mag Top 100 for 3+ years', desc: 'You\'re in music history now.' },
      { num: '3. Get Grammy nomination', desc: 'Industry recognizes you.' },
      { num: '4. Build label empire', desc: '30+ releases from your label.' },
      { num: '5. Create documentary / lasting legacy', desc: 'Your story matters to culture.' }
    ],
    metricsExplain: 'As side effect: Beatport #1 (multiple), Spotify 3M–15M, Instagram 1.5M–5M, Grammy nomination, Major awards, Media everywhere.',
    fee: '$40k–100k+',
    concerts: '🎤 Legend status = 100+ bookings/year, $40k–100k per set. Residencies at iconic venues. Your name sells out.',
    warning: '💡 This is 0.1% of DJs. Black Coffee, Diplo, Carl Cox level. Requires 10+ years + everything aligning perfectly.'
  },

  {
    num: 9,
    title: 'Legendary',
    subtitle: 'Anti-fashion Icon',
    img: 'T9_legendary.png',
    focus: 'He changed music. He changed culture.',
    whoDecides: 'Music history / Cultural impact / Industry looks back',
    actions: [
      { num: '1. Win Grammy', desc: 'Your music is recognized globally.' },
      { num: '2. Define an era', desc: 'People say "the sound of [decade]" and think of you.' },
      { num: '3. Create cultural movement', desc: 'Fashion, activism, art — beyond just music.' },
      { num: '4. Build global brand', desc: 'Merchandise, collaborations, cultural influence.' },
      { num: '5. Leave lasting legacy', desc: 'Autobiography, film, influence on next generation.' }
    ],
    metricsExplain: 'Metrics don\'t matter. You\'re in textbooks now.',
    fee: '$300k–1.5M+',
    concerts: '🎤 Immortal = Your name on a ticket sells out. You play when you want. You\'re in music history.',
    warning: '💡 Maybe 10 DJs globally reach this. Not something to plan for. Something that happens if everything aligns.'
  }
];

const grid = document.getElementById('grid');
const modal = document.getElementById('modal');
const modalBody = document.getElementById('modal-body');
const modalClose = document.getElementById('modal-close');

// Generate cards
tiers.forEach(tier => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="${tier.img}" alt="T${tier.num}"><div class="card-label">T${tier.num} · ${tier.title.toUpperCase()}<div class="card-subtitle">${tier.subtitle}</div></div>`;
  card.addEventListener('click', () => showModal(tier));
  grid.appendChild(card);
});

function showModal(tier) {
  const actionsHtml = tier.actions.map(action => `
    <div class="action-item">
      <span class="action-num">${action.num}</span>
      ${action.desc}
    </div>
  `).join('');

  modalBody.innerHTML = `
    <h2>T${tier.num} · ${tier.title}</h2>
    <div class="modal-subtitle">${tier.subtitle}</div>

    <div class="modal-focus">
      🎯 <strong>What promoter looks for:</strong> ${tier.focus}
    </div>

    <div class="section">
      <h3>🎬 Top 5 Actions</h3>
      <div class="action-list">${actionsHtml}</div>
    </div>

    <div class="section">
      <h3>📊 Metrics (as side effect)</h3>
      <div class="highlight-box">
        ${tier.metricsExplain}
      </div>
    </div>

    <div class="section">
      <h3>💰 Booking Fee</h3>
      <div class="fee-box">
        <div class="fee-amount">${tier.fee}</div>
        <div class="fee-details">${tier.whoDecides ? 'Decided by: ' + tier.whoDecides : ''}</div>
      </div>
    </div>

    <div class="section">
      <h3>📅 Concert Reality</h3>
      <div class="highlight-box">${tier.concerts}</div>
    </div>

    ${tier.warning ? `<div class="warning">${tier.warning}</div>` : ''}
  `;
  modal.classList.add('active');
}

modalClose.addEventListener('click', () => modal.classList.remove('active'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') modal.classList.remove('active');
});
</script>

</body>
</html>
